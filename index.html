<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordlista</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --focus: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }
    .searchbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(247,247,248,0.98), rgba(247,247,248,0.92));
      backdrop-filter: blur(8px);
      padding: 12px 0 14px;
    }
    .search {
      width: 100%;
      padding: 16px 18px;
      font-size: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .search:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .list {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }
    .row {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child { border-bottom: none; }
    .rank {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 14px;
    }
    .word {
      font-size: 18px;
      line-height: 1.3;
      word-break: break-word;
    }
    .class {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
      white-space: nowrap;
      margin-left: 8px;
    }
    .hidden { display: none; }
    @media (max-width: 640px) {
      .wrap { padding: 12px; }
      .row {
        grid-template-columns: 48px 1fr;
        gap: 8px 12px;
        align-items: start;
      }
      .class {
        grid-column: 2;
        text-align: left;
        white-space: normal;
        margin-left: 0;
      }
      .word { font-size: 17px; }
      .search { font-size: 17px; }
    }
  </style>
</head>

    const list = document.getElementById('list');
    const search = document.getElementById('search');

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalize(str) {
      return String(str)
        .toLowerCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '');
    }

    const prepared = data.map(item => ({
      ...item,
      _search: normalize(item.word + ' ' + item.class + ' ' + item.rank)
    }));

    function render(items) {
      list.innerHTML = items.map(item => `
        <div class="row">
          <div class="rank">${item.rank ?? ''}</div>
          <div class="word">${escapeHtml(item.word)}</div>
          <div class="class">${escapeHtml(item.class)}</div>
        </div>
      `).join('');
    }

    function update() {
      const q = normalize(search.value.trim());
      if (!q) {
        render(prepared);
        return;
      }
      const filtered = prepared.filter(item => item._search.includes(q));
      render(filtered);
    }

    search.addEventListener('input', update);
    render(prepared);
  </script>
